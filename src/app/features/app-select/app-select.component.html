<div class="app-select-container">
  <div class="app-select-card">
    <div class="header">
      <div class="logo-icon">📡</div>
      <h1>Zgjidhni Aplikacionin</h1>
      <p>Mirësevini, {{ userName }}</p>
    </div>

    <div class="app-list">
      @for (app of applications; track app.id) {
        <div class="app-card" (click)="selectApp(app)">
          <div class="app-icon">🚕</div>
          <div class="app-info">
            <h3>{{ app.name }}</h3>
            @if (app.description) {
              <p>{{ app.description }}</p>
            }
          </div>
          <div class="app-arrow">→</div>
        </div>
      }
    </div>

    <button class="btn-logout" (click)="logout()">Dil</button>
  </div>
</div>
