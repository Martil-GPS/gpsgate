<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GpsGate Fleet – Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

  <!-- Blue top section with logo -->
  <div class="login-top">
    <div class="login-logo">
      <!-- GPS / location pin icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
      </svg>
    </div>
  </div>

  <!-- White card -->
  <div class="login-card">
    <h2>Log in</h2>

    <!-- Login form -->
    <div id="login-form">
      <div class="form-group">
        <input
          type="text"
          id="username"
          placeholder="Email or username"
          autocomplete="username"
          autocapitalize="none"
          spellcheck="false"
        />
      </div>
      <div class="form-group">
        <input
          type="password"
          id="password"
          placeholder="Password"
          autocomplete="current-password"
        />
      </div>
      <button id="btn-continue" class="btn-primary" disabled>Continue</button>
      <div id="error-msg" class="error-msg"></div>
    </div>

    <!-- App selection (shown after successful login) -->
    <div id="app-section" class="app-section">
      <h3>Choose an application</h3>
      <div id="app-list"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
