<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPS Tracking — Hyrje</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Spinner gjatë ngarkimit -->
  <div id="spinner" class="spinner-overlay hidden">
    <div class="spinner"></div>
  </div>

  <!-- Login Page -->
  <div class="login-wrapper">
    <div class="login-blue-bg"></div>
    <div class="login-card">
      <div class="login-logo">🛰</div>
      <h1 class="login-title">Log in</h1>
      <p class="login-subtitle">Zgjidh serverin dhe hyr me kredencialet tuaja</p>

      <!-- Faza 1: Server + Kredenciale -->
      <div id="credentialsSection">
        <div class="form-group">
          <label for="serverUrl">Server URL</label>
          <input type="text" id="serverUrl" value="https://gps.sts.al" placeholder="Server URL">
        </div>

        <div class="form-group">
          <label for="username">Emri i përdoruesit</label>
          <input type="text" id="username" placeholder="Emri i përdoruesit" autocomplete="username">
        </div>

        <div class="form-group">
          <label for="password">Fjalëkalimi</label>
          <input type="password" id="password" placeholder="Fjalëkalimi" autocomplete="current-password">
        </div>

        <button type="button" id="btnGetApps" class="btn-primary">Gjej Aplikacionet →</button>
      </div>

      <!-- Faza 2: Lista e Aplikacioneve (shfaqet pas fazës 1) -->
      <div id="appListSection" style="display:none">
        <p class="app-list-label">Zgjidhni aplikacionin:</p>
        <div id="appList" class="app-list">
          <!-- Krijohen dinamikisht nga JS -->
        </div>
        <button type="button" id="btnContinue" class="btn-primary" disabled>Vazhdo →</button>
        <button type="button" id="btnBack" class="btn-secondary">← Kthehu</button>
      </div>

      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <!-- Skriptet -->
  <script src="js/api.js"></script>
  <script src="js/login.js"></script>

</body>
</html>
